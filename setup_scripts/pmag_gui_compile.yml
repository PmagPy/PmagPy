name: pmag_gui_compile
# Create this environment natively on Apple silicon.  The macOS arm64 spec
# rejects Intel/Rosetta build hosts and emits only arm64 Mach-O binaries.
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - setuptools
  - wheel
  - pip:
      - pyinstaller==6.20.0
      - wxpython==4.2.4
      - pillow
      - requests
      - numpy
      - scipy
      - matplotlib
      - pandas
      - pytz
