# Conda environment for running PmagPy and the PmagPy GUIs.
#
# Create with:
#   conda env create -f environment.yml
#   conda activate pmagpy
#
# Then install PmagPy itself in editable mode (from the repo root):
#   pip install -e .
#
# Or install the released package from PyPI:
#   pip install pmagpy[maps] pmagpy-cli
name: pmagpy
channels:
  - conda-forge
dependencies:
  - python>=3.9
  # core scientific stack — required by pmagpy
  - numpy
  - scipy
  - matplotlib
  - pandas
  - pytz
  # mapping (optional in the library, but conda-forge handles cartopy
  # and shapely cleanly across platforms)
  - cartopy
  - shapely
  # GUI / pmagpy-cli dependencies
  - wxpython
  - pyqt
  - lmfit
  - pillow
  - appdirs
  # interactive use
  - jupyterlab
  - ipython
  - pip
